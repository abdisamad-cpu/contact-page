<!DOCTYPE html>
<html lang="en">

  <link rel="stylesheet" href="style.css" />

    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <img src="logo.png" alt="logo"/>
</head>
<body>

  <section class="contact-page">
    <div class="container">
      <h1>Contact Us</h1>
      <p class="subtitle">We would love to hear from you</p>

      <div class="contact-grid">
        
        <div class="contact-info">

            <div>
              <h3>Phone</h3>
              <p>+32 123 456 789</p>
            </div>
          </div>

          <div class="info-box">
            <i class="fas fa-envelope"></i>
            <div>
              <h3>Email</h3>
              <p>Abdisamad@awed.be</p>
            </div>
          </div>

          <div class="info-box">
            <i class="fab fa-whatsapp"></i>
            <div>
              <h3>WhatsApp</h3>
              <a
                href="https://wa.me/32465341319"
                target="_blank"
                class="whatsapp-btn"
              >
                Chat on WhatsApp
              </a>
            </div>
          </div>

         <div class="social-icons">

  <a href="https://www.facebook.com/share/1PvXUVUX9C/" target="_blank" rel="noopener noreferrer">
    <i class="fab fa-facebook-f"></i>
  </a>

  <a href="https://www.instagram.com/souldaan143" target="_blank" rel="noopener noreferrer">
    <i class="fab fa-instagram"></i>
  </a>

  <a href="https://www.linkedin.com/in/abdisamad-awad-38543b284" target="_blank" rel="noopener noreferrer">
    <i class="fab fa-linkedin-in"></i>
  </a>

  <a href="https://x.com/Suldanusaladin" target="_blank" rel="noopener noreferrer">
    <i class="fab fa-x-twitter"></i>
  </a>

</div>

        <div class="contact-form">
          <h2>Send a message</h2>
          <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" />
            <input type="email" id="email" placeholder="Your Email" />
            <input type="text" id="subject" placeholder="Subject" />
            <textarea id="message" rows="6" placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
            <p id="formMessage"></p>
          </form>
        </div>
      </div>
<div class="map-section">
